<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chic Lash Boutique - Digital Form</title>
    <style>
        body { margin: 0; padding: 0; background: #f4f4f4; text-align: center; }
        .header { background: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #2c3e50; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 15px; }
        /* 这里的容器必须够大，方便手机操作 */
        iframe { width: 95%; height: 1100px; border: 1px solid #ddd; background: white; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Chic Lash Boutique</h1>
        <p>Please fill out the form below and click Print to save.</p>
        <button class="btn" onclick="window.print()">Print / Save as PDF</button>
    </div>
    <iframe src="headspa.pdf"></iframe>
</body>
</html>
