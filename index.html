<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Agreement | Chic Lash Boutique</title>
    <style>
        /* 页面整体样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }

        /* 标题部分 */
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        /* 按钮样式 */
        .button-group {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background-color: #2c3e50;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 1em;
        }

        .btn:hover {
            background-color: #34495e;
        }

        /* PDF 预览容器 */
        .document-container {
            background: white;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 1000px;
            border: none;
        }

        /* 移动端优化 */
        @media (max-width: 600px) {
            body { padding: 10px; }
            iframe { height: 600px; }
            .header h1 { font-size: 1.5em; }
        }

        /* 打印时隐藏按钮 */
        @media print {
            .button-group, .header p {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Chic Lash Boutique</h1>
        <p>Head Spa Agreement and Consent Form</p>
    </div>

    <div class="button-group">
        <button class="btn" onclick="window.print()">Print This Form</button>
    </div>

    <div class="document-container">
        <iframe src="headspa.pdf"></iframe>
    </div>

    <div style="text-align: center; margin-top: 20px; color: #95a5a6; font-size: 0.9em;">
        &copy; 2026 Chic Lash Boutique. All Rights Reserved.
    </div>

</body>
</html>
